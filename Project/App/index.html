<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pack</title>
    <script>
      (function() {
        const savedDark = localStorage.getItem("dark");
        if (savedDark === "true" ){
            document.documentElement.style.setProperty('--primary-color', '#20b2aa');
            document.documentElement.style.setProperty('--card-bg', '#333333');
            document.documentElement.style.setProperty('--bg-color', '#1f1f1f');
            document.documentElement.style.setProperty('--background', '#474747');
            document.documentElement.style.setProperty('--text-main', '#f5f5f5');
            document.documentElement.style.setProperty('--secondary-color', '#f5f5f5');
            document.documentElement.style.setProperty('--text-muted', '#f5f5f5');
            document.documentElement.style.setProperty('--library-color', '#333333');
            document.documentElement.style.setProperty('--icon-color', '#333333');
            document.documentElement.style.setProperty('--hover-color', '#d3d3d3');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
